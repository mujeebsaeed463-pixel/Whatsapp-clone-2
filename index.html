                    confirmationResult=await auth.signInWithPhoneNumber(phone,appVerifier);
                    phoneContainer.classList.add('hidden');
                    otpInput.classList.remove('hidden');
                    subtitle.textContent='OTP bheja: '+phone;
                    btn.textContent='Verify';btn.disabled=false;
                    otpInput.focus();
                }catch(error){
                    console.error(error);
                    alert('Error: '+error.message);
                    btn.disabled=false;btn.textContent='Next';
                }
            }else{
                const otp=otpInput.value.trim();
                if(otp.length!==6){alert('6 digit OTP daalo');return}
                btn.disabled=true;btn.textContent='Verifying...';
                try{
                    await confirmationResult.confirm(otp);
                }catch(error){
                    alert('Galat OTP');
                    btn.disabled=false;btn.textContent='Verify';
                }
            }
        }

        async function loadUserData(){
            const snap=await database.ref(`users/${currentUser.uid}`).once('value');
            const userData=snap.val();
            if(userData&&userData.name){
                document.getElementById('loginScreen').style.display='none';
                document.getElementById('profileSetup').style.display='none';
                document.getElementById('appContainer').style.display='flex';
                document.getElementById('myStatusImg').src=userData.dp||'';
                document.getElementById('myStatusText').textContent=userData.status||'Tap to add status';
                updateChatList();setupPresence();listenForMessages();
            }else{
                document.getElementById('loginScreen').style.display='none';
                document.getElementById('profileSetup').style.display='flex';
            }
        }

        function selectDP(){document.getElementById('dpInput').click()}

        function handleDPChange(e){
            const file=e.target.files[0];
            if(file){
                const reader=new FileReader();
                reader.onload=function(evt){
                    document.getElementById('dpPreview').src=evt.target.result;
                    document.getElementById('dpUpload').classList.add('has-image');
                };
                reader.readAsDataURL(file);
            }
        }

        async function saveProfile(){
            const name=document.getElementById('nameInput').value.trim();
            if(!name){alert('Naam daalo');return}
            const dp=document.getElementById('dpPreview').src||'';
            await database.ref(`users/${currentUser.uid}`).set({
                phone:currentUser.phoneNumber,name:name,dp:dp,status:'Hey there! I am using WhatsApp.',statusTime:Date.now(),online:true,lastSeen:Date.now()
            });
            loadUserData();
        }

        function setupPresence(){
            const userStatusRef=database.ref(`users/${currentUser.uid}`);
            userStatusRef.update({online:true,lastSeen:Date.now()});
            userStatusRef.onDisconnect().update({online:false,lastSeen:Date.now()});
            setInterval(()=>userStatusRef.update({lastSeen:Date.now()}),30000);
        }

        function switchTab(tab){
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            event.target.classList.add('active');
            if(tab==='chats'){
                document.getElementById('chatList').style.display='block';
                document.getElementById('statusList').style.display='none';
                document.getElementById('fabBtn').style.display='flex';
                updateChatList();
            }else{
                document.getElementById('chatList').style.display='none';
                document.getElementById('statusList').style.display='block';
                document.getElementById('fabBtn').style.display='none';
                updateStatusList();
            }
        }

        async function updateChatList(){
            const list=document.getElementById('chatList');
            list.innerHTML='';
            const chatsSnap=await database.ref(`userChats/${currentUser.uid}`).once('value');
            const chatIds=chatsSnap.val()||{};
            if(Object.keys(chatIds).length===0){
                list.innerHTML='<div class="empty-state"><div class="empty-state-icon">💬</div><h3>No chats yet</h3><p>Tap the message button to start a new chat</p></div>';
                return;
            }
            for(const[chatId,chatInfo]of Object.entries(chatIds)){
                const otherUid=chatInfo.otherUid;
                const userSnap=await database.ref(`users/${otherUid}`).once('value');
                const userData=userSnap.val();
                if(!userData)continue;
                const msgsSnap=await database.ref(`chats/${chatId}/messages`).limitToLast(1).once('value');
                const msgs=msgsSnap.val()||{};
                const lastMsg=Object.values(msgs)[0];
                const unreadSnap=await database.ref(`chats/${chatId}/unread/${currentUser.uid}`).once('value');
                const unreadCount=unreadSnap.val()||0;
                const item=document.createElement('div');
                item.className='chat-item';
                item.onclick=()=>openChat(chatId,otherUid);
                item.innerHTML=`<div class="chat-avatar"><img src="${userData.dp||''}" alt="" onerror="this.style.display='none'"><div class="online-indicator ${userData.online?'visible':''}"></div></div><div class="chat-info"><div class="chat-header-row"><span class="chat-name">${userData.name}</span><span class="chat-time">${lastMsg?formatTime(lastMsg.timestamp):''}</span></div><div class="chat-message-row"><span class="chat-message">${lastMsg?lastMsg.text:'No messages'}</span>${unreadCount>0?`<span class="unread-badge">${unreadCount}</span>`:''}</div></div>`;
                list.appendChild(item);
            }
        }

        function openNewChat(){document.getElementById('newChatModal').classList.add('active')}
        function closeNewChat(){document.getElementById('newChatModal').classList.remove('active')}

        async function startNewChat(){
            const number=document.getElementById('newContactNumber').value.trim();
            if(number.length<10){alert('Valid number daalo');return}
            const phone='+92'+number;
            if(phone===currentUser.phoneNumber){alert('Khud se nahi');return}
            const usersSnap=await database.ref('users').orderByChild('phone').equalTo(phone).once('value');
            const users=usersSnap.val();
            if(!users){alert('User nahi mila! Pehle unko join karne bolo.');return}
            const otherUid=Object.keys(users)[0];
            const chatId=[currentUser.uid,otherUid].sort().join('_');
            const existingChat=await database.ref(`userChats/${currentUser.uid}/${chatId}`).once('value');
            if(existingChat.val()){closeNewChat();openChat(chatId,otherUid);return}
            await database.ref(`userChats/${currentUser.uid}/${chatId}`).set({otherUid,timestamp:Date.now(),lastMessage:'',lastMessageTime:Date.now()});
            await database.ref(`userChats/${otherUid}/${chatId}`).set({otherUid:currentUser.uid,timestamp:Date.now(),lastMessage:'',lastMessageTime:Date.now()});
            await database.ref(`chats/${chatId}/members`).set({[currentUser.uid]:true,[otherUid]:true});
            closeNewChat();openChat(chatId,otherUid);showToast('Chat started!');
        }

        async function openChat(chatId,otherUid){
            currentChat={chatId,otherUid};selectedMessages.clear();selectionMode=false;document.getElementById('selectionBar').classList.remove('active');
            const userSnap=await database.ref(`users/${otherUid}`).once('value');
            const userData=userSnap.val();
            document.getElementById('chatName').textContent=userData.name;
            document.getElementById('chatAvatar').src=userData.dp||'';
            updateChatStatus(userData);
            await database.ref(`chats/${chatId}/unread/${currentUser.uid}`).set(0);
            renderMessages();
            document.getElementById('chatScreen').style.display='flex';
            database.ref(`chats/${chatId}/messages`).on('value',snap=>renderMessages(snap.val()));
            database.ref(`typing/${chatId}/${otherUid}`).on('value',snap=>{
                const isTyping=snap.val();
                const statusEl=document.getElementById('chatStatus');
                if(isTyping){statusEl.textContent='typing...';statusEl.className='chat-header-status typing'}
                else{updateChatStatus(userData)}
            });
            database.ref(`users/${otherUid}`).on('value',snap=>updateChatStatus(snap.val()));
        }

        function updateChatStatus(userData){
            const statusEl=document.getElementById('chatStatus');
            if(userData.online){statusEl.textContent='online';statusEl.className='chat-header-status online'}
            else{statusEl.textContent='last seen '+formatLastSeen(userData.lastSeen);statusEl.className='chat-header-status'}
        }

        function closeChat(){
            document.getElementById('chatScreen').style.display='none';
            if(currentChat){
                database.ref(`chats/${currentChat.chatId}/messages`).off();
                database.ref(`typing/${currentChat.chatId}/${currentChat.otherUid}`).off();
                database.ref(`users/${currentChat.otherUid}`).off();
            }
            currentChat=null;updateChatList();
        }

        function renderMessages(messages=null){
            const container=document.getElementById('chatMessages');
            container.innerHTML='';
            if(!currentChat)return;
            if(!messages){
                database.ref(`chats/${currentChat.chatId}/messages`).once('value').then(snap=>renderMessages(snap.val()));
                return;
            }
            if(!messages||Object.keys(messages).length===0){
                container.innerHTML='<div style="text-align:center;color:#8696a0;padding:40px;">No messages yet. Say hello! 👋</div>';
                return;
            }
            const sortedMsgs=Object.entries(messages).sort((a,b)=>(a[1].timestamp||0)-(b[1].timestamp||0));
            sortedMsgs.forEach(([msgId,msg])=>{
                const div=document.createElement('div');
                const isSent=msg.sender===currentUser.uid;
                div.className=`message ${isSent?'sent':'received'}`;
                div.dataset.msgId=msgId;
                if(selectedMessages.has(msgId))div.classList.add('selected');
                div.innerHTML=`<div class="message-text">${escapeHtml(msg.text||'')}</div><div class="message-time">${formatTime(msg.timestamp)}${isSent?`<svg class="message-status ${msg.read?'read':''}" viewBox="0 0 16 15" fill="currentColor" style="width:16px;height:16px;margin-left:4px;"><path d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.319.319 0 0 0-.484.032l-.378.483a.418.418 0 0 0 .036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.064-.512zm-4.1 0l-.478-.372a.365.365 0 0 0-.51.063L4.566 9.879a.32.32 0 0 1-.484.033L1.891 7.769a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0 .006.514l3.258 3.185c.143.14.361.125.484-.033l6.272-8.048a.365.365 0 0 0-.063-.51z"/></svg>`:''}</div>`;
                let longPressTimer;
                div.addEventListener('mousedown',()=>{longPressTimer=setTimeout(()=>startSelection(msgId),500)});
                div.addEventListener('mouseup',()=>clearTimeout(longPressTimer));
                div.addEventListener('mouseleave',()=>clearTimeout(longPressTimer));
                div.addEventListener('touchstart',()=>{longPressTimer=setTimeout(()=>startSelection(msgId),500)});
                div.addEventListener('touchend',()=>clearTimeout(longPressTimer));
                container.appendChild(div);
            });
            container.scrollTop=container.scrollHeight;
            if(currentChat)markMessagesAsRead();
        }

        function escapeHtml(text){const div=document.createElement('div');div.textContent=text;return div.innerHTML}
        function formatTime(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}
        function formatLastSeen(ts){const d=new Date(ts),now=new Date(),diff=now-d;if(diff<60000)return'just now';if(diff<3600000)return Math.floor(diff/60000)+' min ago';return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}

        function startSelection(msgId){
            if(!selectionMode){selectionMode=true;selectedMessages.clear();document.getElementById('selectionBar').classList.add('active')}
            toggleSelection(msgId);
        }

        function toggleSelection(msgId){
            if(selectedMessages.has(msgId))selectedMessages.delete(msgId);else selectedMessages.add(msgId);
            if(selectedMessages.size===0){selectionMode=false;document.getElementById('selectionBar').classList.remove('active')}
            else{document.getElementById('selectionCount').textContent=selectedMessages.size+' selected'}
            renderMessages();
        }

        async function copySelected(){
            const texts=[],snap=await database.ref(`chats/${currentChat.chatId}/messages`).once('value'),msgs=snap.val();
            selectedMessages.forEach(id=>{if(msgs[id])texts.push(msgs[id].text)});
            navigator.clipboard.writeText(texts.join('\n'));showToast('Copied');exitSelection();
        }

        async function forwardSelected(){
            const phone=prompt('Number daalo:');
            if(!phone)return;
            const fullPhone=phone.startsWith('+')?phone:'+92'+phone;
            const usersSnap=await database.ref('users').orderByChild('phone').equalTo(fullPhone).once('value');
            const users=usersSnap.val();
            if(!users){alert('User nahi mila');return}
            const otherUid=Object.keys(users)[0],chatId=[currentUser.uid,otherUid].sort().join('_');
            await database.ref(`userChats/${currentUser.uid}/${chatId}`).set({otherUid,timestamp:Date.now(),lastMessage:'',lastMessageTime:Date.now()});
            await database.ref(`userChats/${otherUid}/${chatId}`).set({otherUid:currentUser.uid,timestamp:Date.now(),lastMessage:'',lastMessageTime:Date.now()});
            await database.ref(`chats/${chatId}/members`).set({[currentUser.uid]:true,[otherUid]:true});
            const snap=await database.ref(`chats/${currentChat.chatId}/messages`).once('value'),msgs=snap.val();
            selectedMessages.forEach(async id=>{if(msgs[id])await database.ref(`chats/${chatId}/messages`).push({text:msgs[id].text,sender:currentUser.uid,timestamp:Date.now(),read:false})});
            showToast('Forwarded');exitSelection();
        }

        async function deleteSelected(){
            if(!confirm('Delete?'))return;
            selectedMessages.forEach(async id=>{await database.ref(`chats/${currentChat.chatId}/messages/${id}`).remove()});
            exitSelection();
        }

        function exitSelection(){selectionMode=false;selectedMessages.clear();document.getElementById('selectionBar').classList.remove('active');renderMessages()}

        async function sendMessage(){
            const input=document.getElementById('messageInput'),text=input.value.trim();
            if(!text||!currentChat)return;
            try{
                await database.ref(`chats/${currentChat.chatId}/messages`).push({text:text,sender:currentUser.uid,timestamp:Date.now(),read:false});
                await database.ref(`userChats/${currentUser.uid}/${currentChat.chatId}`).update({lastMessage:text,lastMessageTime:Date.now(),timestamp:Date.now()});
                await database.ref(`userChats/${currentChat.otherUid}/${currentChat.chatId}`).update({lastMessage:text,lastMessageTime:Date.now(),timestamp:Date.now()});
                const unreadRef=database.ref(`chats/${currentChat.chatId}/unread/${currentChat.otherUid}`);
                const unreadSnap=await unreadRef.once('value');
                await unreadRef.set((unreadSnap.val()||0)+1);
                input.value='';
            }catch(error){console.error('Send error:',error);alert('Message bhejne mein error');}
        }

        async function markMessagesAsRead(){
            if(!currentChat)return;
            const messagesRef=database.ref(`chats/${currentChat.chatId}/messages`);
            const snapshot=await messagesRef.once('value');
            const messages=snapshot.val()||{};
            const updates={};
            Object.entries(messages).forEach(([msgId,msg])=>{if(msg.sender!==currentUser.uid&&!msg.read)updates[`${msgId}/read`]=true});
            if(Object.keys(updates).length>0)await messagesRef.update(updates);
            await database.ref(`chats/${currentChat.chatId}/unread/${currentUser.uid}`).set(0);
        }

        function handleKeyPress(e){
            if(e.key==='Enter')sendMessage();
            if(currentChat){
                database.ref(`typing/${currentChat.chatId}/${currentUser.uid}`).set(true);
                clearTimeout(typingTimeout);
                typingTimeout=setTimeout(()=>{database.ref(`typing/${currentChat.chatId}/${currentUser.uid}`).set(false)},3000);
            }
        }

        async function addNewStatus(){
            const status=prompt('Status daalo (max 100):');
            if(!status||!status.trim())return;
            await database.ref(`users/${currentUser.uid}`).update({status:status.trim(),statusTime:Date.now()});
            document.getElementById('myStatusText').textContent=status.trim();
            if(document.getElementById('statusList').style.display!=='none')updateStatusList();
            showToast('Status updated');
        }

        async function updateStatusList(){
            const container=document.getElementById('otherStatuses');
            container.innerHTML='';
            try{
                const snap=await database.ref('users').once('value');
                const users=snap.val()||{};
                const now=Date.now();
                const oneDay=24*60*60*1000;
                let hasStatuses=false;
                for(const[uid,userData]of Object.entries(users)){
                    if(uid===currentUser.uid)continue;
                    if(!userData.status||!userData.status.trim())continue;
                    const statusAge=now-(userData.statusTime||0);
                    if(statusAge>oneDay)continue;
                    hasStatuses=true;
                    const div=document.createElement('div');
                    div.className='status-item';
                    div.onclick=()=>viewStatus(userData);
                    div.innerHTML=`<div class="status-ring"><div class="status-ring-inner"><img src="${userData.dp||''}" alt="" onerror="this.style.display='none'"></div></div><div class="chat-info"><div class="chat-header-row"><span class="chat-name">${userData.name||'Unknown'}</span></div><div class="chat-message-row"><span class="chat-message">${formatTime(userData.statusTime)}</span></div></div>`;
                    container.appendChild(div);
                }
                if(!hasStatuses)container.innerHTML='<div style="text-align:center;padding:40px;color:#8696a0;"><p>No recent statuses</p></div>';
            }catch(error){console.error('Status error:',error);}
        }

        function viewStatus(userData){
            const view=document.getElementById('statusView');
            const textEl=document.getElementById('viewStatusText');
            const bar=document.getElementById('statusProgress');
            textEl.textContent=userData.status||'No status';
            view.classList.add('active');
            let progress=0;
            bar.style.width='0%';
            if(window.statusViewTimer)clearInterval(window.statusViewTimer);
            window.statusViewTimer=setInterval(()=>{
                progress+=2;
                bar.style.width=progress+'%';
                if(progress>=100){clearInterval(window.statusViewTimer);closeStatus();}
            },100);
        }

        function closeStatus(){
            if(window.statusViewTimer)clearInterval(window.statusViewTimer);
            document.getElementById('statusView').classList.remove('active');
            document.getElementById('statusProgress').style.width='0%';
        }

        function showToast(msg){
            const div=document.createElement('div');
            div.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2a3942;color:white;padding:12px 24px;border-radius:25px;z-index:1000;font-size:14px;';
            div.textContent=msg;
            document.body.appendChild(div);
            setTimeout(()=>div.remove(),2000);
        }

        function logout(){auth.signOut();location.reload()}

        function listenForMessages(){
            database.ref(`userChats/${currentUser.uid}`).on('child_changed',async snap=>{
                const chatId=snap.key;
                if(document.getElementById('chatScreen').style.display==='flex'&&currentChat?.chatId===chatId)return;
                playNotificationSound();
            });
        }

        document.addEventListener('contextmenu',e=>e.preventDefault());
    </script>
</body>
</html>
